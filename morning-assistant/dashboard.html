<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>J.A.R.V.I.S. — Morning Assistant Dashboard</title>

<!-- React / ReactDOM / Babel / Recharts / Tailwind (すべてCDN) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700&display=swap" rel="stylesheet" />

<style>
  :root { --cyan: #22d3ee; --cyan-b: #67e8f9; }
  html, body { margin:0; height:100%; background:#050510; overflow:hidden; }
  body { font-family:'Share Tech Mono', ui-monospace, 'SF Mono', Menlo, monospace; color:#a5f3fc; }
  #root { height:100vh; }

  .glow      { text-shadow:0 0 6px rgba(34,211,238,.9), 0 0 14px rgba(34,211,238,.5); }
  .glow-soft { text-shadow:0 0 6px rgba(34,211,238,.5); }
  .box-glow  { box-shadow:0 0 12px rgba(34,211,238,.25), inset 0 0 18px rgba(34,211,238,.06); }
  .panel {
    background:linear-gradient(160deg, rgba(12,26,48,.55), rgba(6,12,26,.55));
    border:1px solid rgba(34,211,238,.28);
    backdrop-filter:blur(2px);
  }
  .orbitron { font-family:'Orbitron', monospace; letter-spacing:.12em; }

  /* ===== グロー & 回転アニメーション ===== */
  @keyframes spin      { to { transform:rotate(360deg); } }
  @keyframes spinrev   { to { transform:rotate(-360deg); } }
  @keyframes corepulse { 0%,100%{ opacity:.55; transform:scale(1);} 50%{ opacity:1; transform:scale(1.06);} }
  @keyframes sweep     { to { transform:rotate(360deg); } }
  @keyframes flicker   { 0%,100%{opacity:1;} 92%{opacity:1;} 94%{opacity:.55;} 96%{opacity:1;} }
  @keyframes gridmove  { to { background-position:0 40px; } }

  .spin-20  { animation:spin 20s linear infinite; }
  .spin-14  { animation:spinrev 14s linear infinite; }
  .spin-8   { animation:spin 8s linear infinite; }
  .core     { animation:corepulse 3s ease-in-out infinite; }
  .sweep    { animation:sweep 4s linear infinite; transform-origin:center; }
  .flicker  { animation:flicker 6s infinite; }

  .bg-grid {
    background-image:
      linear-gradient(rgba(34,211,238,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,211,238,.05) 1px, transparent 1px);
    background-size:40px 40px;
    animation:gridmove 6s linear infinite;
  }

  /* ログ用スクロールバー非表示 */
  .no-sb::-webkit-scrollbar { display:none; }
  .no-sb { scrollbar-width:none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { AreaChart, Area, LineChart, Line, ResponsiveContainer, YAxis, Tooltip, CartesianGrid } = Recharts;

/* =========================================================
   モックデータ（モーニングアシスタントと連動）
   ========================================================= */
const WEATHER = { city:'YOKOHAMA', cond:'晴れ時々くもり', high:28, low:21, hum:62, wind:3.4 };
const SCHEDULE = [
  { t:'10:00', title:'デザインレビュー',        tag:'MTG'  },
  { t:'13:30', title:'クライアント打ち合わせ',  tag:'CALL' },
  { t:'18:00', title:'ジム',                    tag:'FIT'  },
];
const CHART = [12,18,16,24,28,26,34,40,38,47,52,63].map((v,i)=>({ i, v }));
const LOG_SEED = [
  'BOOT  ▹ J.A.R.V.I.S. core online',
  'AUTH  ▹ user "たくちゃん" verified',
  'NET   ▹ Fetching weather ... OK (Yokohama)',
  'CAL   ▹ Syncing Google Calendar ... 3 events',
  'LLM   ▹ Generating script (claude-sonnet-5)',
  'TTS   ▹ Synthesizing voice ... 300 chars',
  'AUDIO ▹ Playback ready · mock_demo.mp3',
  'SYS   ▹ System Check ... OK',
];
const LOG_STREAM = [
  'SCAN  ▹ Perimeter nominal',
  'PWR   ▹ Arc reactor 3.2 GJ · stable',
  'NET   ▹ Refreshing forecast ...',
  'CAL   ▹ Next event in 04:12:33',
  'CPU   ▹ load 12% · temp 41°C',
  'SEC   ▹ No anomalies detected',
  'DATA  ▹ Downloads +128 /min',
  'REV   ▹ Revenue stream healthy',
  'TTS   ▹ Voice model warm',
  'SYS   ▹ All subsystems ... OK',
];

/* =========================================================
   小物コンポーネント
   ========================================================= */
function useClock(){
  const [t,setT] = useState(new Date());
  useEffect(()=>{ const id=setInterval(()=>setT(new Date()),1000); return ()=>clearInterval(id); },[]);
  return t;
}

function CountUp({ target, prefix='', suffix='', dur=1600 }){
  const [n,setN] = useState(0);
  useEffect(()=>{
    let raf, start;
    const step = (ts)=>{ if(!start) start=ts;
      const p = Math.min((ts-start)/dur, 1);
      setN(Math.floor((1-Math.pow(1-p,3))*target));
      if(p<1) raf=requestAnimationFrame(step);
    };
    raf=requestAnimationFrame(step); return ()=>cancelAnimationFrame(raf);
  },[target]);
  return <span>{prefix}{n.toLocaleString()}{suffix}</span>;
}

function Stat({ label, children, sub }){
  return (
    <div className="panel box-glow rounded-md px-4 py-3">
      <div className="text-[10px] tracking-[.3em] text-cyan-300/60">{label}</div>
      <div className="orbitron text-3xl md:text-4xl text-cyan-100 glow mt-1 leading-none">{children}</div>
      {sub && <div className="text-[10px] text-cyan-400/70 mt-1">{sub}</div>}
    </div>
  );
}

function Panel({ title, children, className='' }){
  return (
    <div className={"panel box-glow rounded-md flex flex-col overflow-hidden "+className}>
      <div className="flex items-center gap-2 px-3 py-1.5 border-b border-cyan-400/20">
        <span className="w-1.5 h-1.5 rounded-full bg-cyan-300 glow"></span>
        <span className="text-[10px] tracking-[.3em] text-cyan-300/70">{title}</span>
      </div>
      <div className="flex-1 min-h-0">{children}</div>
    </div>
  );
}

/* =========================================================
   中央: アーク・リアクター / レーダー
   ========================================================= */
function ArcReactor(){
  const tick = (n, r)=> Array.from({length:n}).map((_,i)=>{
    const a=(i/n)*360;
    return <line key={i} x1="100" y1={100-r} x2="100" y2={100-r+6}
      stroke="rgba(103,232,249,.6)" strokeWidth="1.5"
      transform={`rotate(${a} 100 100)`} />;
  });
  return (
    <div className="relative w-[300px] h-[300px] flex items-center justify-center">
      {/* グロー土台 */}
      <div className="absolute w-56 h-56 rounded-full core"
           style={{background:'radial-gradient(circle, rgba(34,211,238,.55) 0%, rgba(34,211,238,.12) 40%, transparent 70%)'}}></div>

      <svg viewBox="0 0 200 200" className="absolute w-full h-full"
           style={{filter:'drop-shadow(0 0 6px rgba(34,211,238,.7))'}}>
        {/* 外側の目盛りリング（低速回転） */}
        <g className="spin-20" style={{transformOrigin:'100px 100px'}}>
          <circle cx="100" cy="100" r="94" fill="none" stroke="rgba(34,211,238,.35)" strokeWidth="1"/>
          {tick(48, 94)}
        </g>
        {/* 破線リング（逆回転） */}
        <g className="spin-14" style={{transformOrigin:'100px 100px'}}>
          <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(103,232,249,.7)"
                  strokeWidth="1.5" strokeDasharray="4 10"/>
        </g>
        {/* レーダー・スイープ */}
        <g className="sweep" style={{transformOrigin:'100px 100px'}}>
          <path d="M100 100 L100 30 A70 70 0 0 1 160 78 Z" fill="url(#sweepg)"/>
        </g>
        {/* 内側の三角セグメント（高速回転） */}
        <g className="spin-8" style={{transformOrigin:'100px 100px'}}>
          {Array.from({length:6}).map((_,i)=>(
            <path key={i} d="M100 42 L108 62 L92 62 Z" fill="rgba(34,211,238,.55)"
                  transform={`rotate(${i*60} 100 100)`}/>
          ))}
        </g>
        {/* コア */}
        <circle cx="100" cy="100" r="26" fill="rgba(34,211,238,.10)" stroke="rgba(103,232,249,.9)" strokeWidth="2"/>
        <circle cx="100" cy="100" r="14" fill="rgba(103,232,249,.9)" className="core"/>
        <defs>
          <radialGradient id="sweepg">
            <stop offset="0%" stopColor="rgba(34,211,238,.5)"/>
            <stop offset="100%" stopColor="rgba(34,211,238,0)"/>
          </radialGradient>
        </defs>
      </svg>

      {/* 中央テキスト */}
      <div className="absolute text-center">
        <div className="orbitron text-cyan-100 text-xl glow">{WEATHER.high}°</div>
        <div className="text-[9px] text-cyan-300/70">CORE {WEATHER.low}° / {WEATHER.high}°</div>
      </div>
    </div>
  );
}

/* =========================================================
   右: システムログ（下から上へ自動スクロール）
   ========================================================= */
function SystemLog(){
  const [lines,setLines] = useState(LOG_SEED);
  const ref = useRef(null);
  useEffect(()=>{
    let k=0;
    const id=setInterval(()=>{
      const now=new Date().toLocaleTimeString('en-GB');
      const msg=LOG_STREAM[k%LOG_STREAM.length]; k++;
      setLines(prev=>[...prev.slice(-40), `[${now}] ${msg}`]);
    },1400);
    return ()=>clearInterval(id);
  },[]);
  useEffect(()=>{ if(ref.current) ref.current.scrollTop=ref.current.scrollHeight; },[lines]);
  return (
    <div ref={ref} className="no-sb h-full overflow-y-auto px-3 py-2 text-[11px] leading-relaxed bg-black/40">
      {lines.map((l,i)=>{
        const ok = /OK|online|verified|ready|healthy|nominal|stable/.test(l);
        return (
          <div key={i} className="whitespace-pre-wrap">
            <span className="text-cyan-500/50">{l.slice(0,10)}</span>
            <span className={ok?'text-emerald-300 glow-soft':'text-cyan-200/90'}>{l.slice(10)}</span>
          </div>
        );
      })}
      <div className="text-cyan-300 glow">▊</div>
    </div>
  );
}

/* =========================================================
   ルート
   ========================================================= */
function App(){
  const t = useClock();
  const hh = String(t.getHours()).padStart(2,'0');
  const mm = String(t.getMinutes()).padStart(2,'0');
  const ss = String(t.getSeconds()).padStart(2,'0');

  return (
    <div className="h-screen w-screen bg-grid flex flex-col p-4 gap-3 select-none">

      {/* ===== ヘッダー ===== */}
      <header className="panel box-glow rounded-md px-5 py-2 flex items-center justify-between flicker">
        <div className="flex items-center gap-3">
          <span className="orbitron text-cyan-100 text-xl glow">J.A.R.V.I.S.</span>
          <span className="text-[10px] text-cyan-400/60 tracking-[.3em]">MORNING ASSISTANT</span>
        </div>
        <div className="hidden md:block text-sm text-cyan-200/90 glow-soft">
          おはようございます、たくちゃん。本日の横浜は「{WEATHER.cond}」です。
        </div>
        <div className="flex items-center gap-3">
          <span className="text-[10px] text-emerald-300 glow-soft">● SYSTEMS ONLINE</span>
          <span className="orbitron text-cyan-100 text-lg glow">{hh}:{mm}<span className="text-cyan-400/60 text-sm">:{ss}</span></span>
        </div>
      </header>

      {/* ===== メイン 3カラム ===== */}
      <main className="flex-1 min-h-0 grid grid-cols-12 gap-3">

        {/* --- 左: 統計 & グラフ --- */}
        <section className="col-span-3 flex flex-col gap-3 min-h-0">
          <Stat label="DOWNLOADS" sub="▲ +12.4% / 24h">
            <CountUp target={84213} />
          </Stat>
          <Stat label="REVENUE" sub="▲ +8.1% / 24h">
            <CountUp target={1284500} prefix="¥" />
          </Stat>
          <Panel title="TRAFFIC · 12H" className="flex-1">
            <div className="w-full h-full p-1">
              <ResponsiveContainer width="100%" height="100%">
                <AreaChart data={CHART} margin={{top:10,right:8,left:-24,bottom:0}}>
                  <defs>
                    <linearGradient id="cy" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor="#22d3ee" stopOpacity=".55"/>
                      <stop offset="100%" stopColor="#22d3ee" stopOpacity="0"/>
                    </linearGradient>
                  </defs>
                  <CartesianGrid stroke="rgba(34,211,238,.08)" vertical={false}/>
                  <YAxis tick={{fill:'rgba(103,232,249,.5)',fontSize:9}} axisLine={false} tickLine={false}/>
                  <Tooltip contentStyle={{background:'#050510',border:'1px solid rgba(34,211,238,.4)',borderRadius:6,fontSize:11,color:'#a5f3fc'}} labelStyle={{display:'none'}}/>
                  <Area type="monotone" dataKey="v" stroke="#67e8f9" strokeWidth={2}
                        fill="url(#cy)" dot={false}
                        style={{filter:'drop-shadow(0 0 4px rgba(34,211,238,.8))'}}/>
                </AreaChart>
              </ResponsiveContainer>
            </div>
          </Panel>
        </section>

        {/* --- 中央: アークリアクター + 天気/予定 --- */}
        <section className="col-span-6 flex flex-col gap-3 min-h-0">
          <div className="panel box-glow rounded-md flex-1 flex flex-col items-center justify-center relative overflow-hidden">
            <div className="absolute top-3 left-4 text-[10px] tracking-[.3em] text-cyan-300/60">ARC REACTOR · WEATHER CORE</div>
            <ArcReactor/>
            <div className="absolute bottom-3 w-full flex justify-center gap-8 text-center">
              <div><div className="text-[9px] text-cyan-400/60">CONDITION</div><div className="text-cyan-100 glow-soft text-sm">{WEATHER.cond}</div></div>
              <div><div className="text-[9px] text-cyan-400/60">HUMIDITY</div><div className="text-cyan-100 glow-soft text-sm">{WEATHER.hum}%</div></div>
              <div><div className="text-[9px] text-cyan-400/60">WIND</div><div className="text-cyan-100 glow-soft text-sm">{WEATHER.wind} m/s</div></div>
            </div>
          </div>
          <Panel title="TODAY · SCHEDULE" className="h-[32%]">
            <div className="h-full grid grid-cols-3 gap-2 p-2">
              {SCHEDULE.map((s,i)=>(
                <div key={i} className="panel rounded px-3 py-2 flex flex-col justify-between">
                  <div className="flex items-center justify-between">
                    <span className="orbitron text-cyan-100 glow text-lg">{s.t}</span>
                    <span className="text-[9px] px-1.5 py-0.5 rounded border border-cyan-400/40 text-cyan-300">{s.tag}</span>
                  </div>
                  <div className="text-xs text-cyan-200/90 mt-1">{s.title}</div>
                </div>
              ))}
            </div>
          </Panel>
        </section>

        {/* --- 右: システムログ --- */}
        <section className="col-span-3 min-h-0">
          <Panel title="SYSTEM LOG · LIVE" className="h-full">
            <SystemLog/>
          </Panel>
        </section>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
